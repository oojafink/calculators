<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClimbMill, Recovery & Trail Effort Calculators</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tabs {
      display: flex;
      margin-bottom: 1rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .tab-button {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 8px;
      background-color: #e0e0e0;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }
    .tab-button.active {
      background-color: #0077cc;
      color: white;
    }

    .calculator {
      display: none;
      background-color: #ffffff;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 400px;
    }
    .calculator.active {
      display: block;
    }

    h1, h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    input[type="number"], select {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .inline-inputs {
      display: flex;
      gap: 0.5rem;
    }
    .inline-inputs input {
      flex: 1;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      background-color: #0077cc;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-bottom: 0.5rem;
    }
    button:hover {
      background-color: #005fa3;
    }
    .result {
      margin-top: 1rem;
      font-size: 1.2rem;
      text-align: center;
      white-space: pre-line;
    }
    @media (max-width: 400px) {
      h1, h2 {
        font-size: 1.1rem;
      }
      .result {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-button active" onclick="switchTab('climb')">ClimbMill Calculator</button>
    <button class="tab-button" onclick="switchTab('recovery')">Recovery Pace Calculator</button>
    <button class="tab-button" onclick="switchTab('trail')">Trail Effort Calculator</button>
  </div>

  <!-- ClimbMill Calculator -->
  <div id="climb" class="calculator active">
    <h2>Matrix Fitness Performance ClimbMill Floor Calculator</h2>
    <label for="presetClimbInput">Preset climb:</label>
    <select id="presetClimbInput" onchange="selectPresetClimb()">
      <option value="">-- Select a preset climb --</option>
      <option value="1690">Mitre Peak NZL (1,690m)</option>
      <option value="1345">Ben Nevis GBR (1,345m)</option>
      <option value="1085">Snowdon/Yr Wyddfa GBR (1,085m)</option>
      <option value="978">Scafell Pike GBR (978m)</option>
      <option value="828">Burj Khalifa UAE (828m)</option>
      <option value="680.5">Merdeka 118 MYS (680.5m)</option>
      <option value="553">CN Tower CAN (553m)</option>
      <option value="381">Empire State Building USA (381m)</option>
      <option value="330">Eiffel Tower FRA (330m)</option>
      <option value="309.6">The Shard GBR (309.6m)</option>
    </select>

    <label for="heightInput">Enter height in metres:</label>
    <input type="number" id="heightInput" step="0.01" placeholder="e.g. 10" min="0.01" />

    <button onclick="calculateSteps()">Convert to Floors</button>

    <label for="floorInput">Enter height in floors:</label>
    <input type="number" id="floorInput" step="1" placeholder="e.g. 20" min="1" />

    <button onclick="calculateHeight()">Convert to Metres</button>

    <hr style="margin: 1.25rem 0; border: none; border-top: 1px solid #ddd;" />

    <h2>Target Time / Level Calculator</h2>
    <label for="targetHeightInput">Target ascent in metres:</label>
    <input type="number" id="targetHeightInput" step="0.01" placeholder="e.g. 1000" min="0.01" />

    <label>Target time:</label>
    <div class="inline-inputs">
      <input type="number" id="targetMinutesInput" placeholder="Minutes" min="0" />
      <input type="number" id="targetSecondsInput" placeholder="Seconds" min="0" max="59" />
    </div>

    <button onclick="calculateLevelForTarget()">Calculate Required Level</button>
    <button onclick="resetClimbMill()">Reset</button>

    <div class="result" id="resultSteps"></div>
  </div>

  <!-- Recovery Pace Calculator -->
  <div id="recovery" class="calculator">
    <h2>Recovery Pace Calculator</h2>
    <label>Enter your 5K time:</label>
    <div class="inline-inputs">
      <input type="number" id="hours" placeholder="Hours" min="0" />
      <input type="number" id="minutes" placeholder="Minutes" min="0" max="59" />
      <input type="number" id="seconds" placeholder="Seconds" min="0" max="59" />
    </div>

    <button onclick="calculateRecoveryPace()">Calculate</button>
    <button onclick="resetRecovery()">Reset</button>

    <div class="result" id="resultPace"></div>
  </div>

  <!-- Trail Effort Calculator -->
  <div id="trail" class="calculator">
    <h2>Trail Effort Calculator</h2>
    <label for="trailDistance">Enter horizontal distance (km):</label>
    <input type="number" id="trailDistance" step="0.01" placeholder="e.g. 12.5" min="0" />

    <label for="ascent">Enter total ascent (m):</label>
    <input type="number" id="ascent" step="1" placeholder="e.g. 600" min="0" />

    <label for="conversionFactor">Conversion factor (default is 0.01):</label>
    <input type="number" id="conversionFactor" step="0.001" value="0.01" min="0" />

    <button onclick="calculateTrailEffort()">Calculate</button>
    <button onclick="resetTrail()">Reset</button>

    <div class="result" id="resultTrail"></div>
  </div>

  <script>
    // Matrix-confirmed ClimbMill constants:
    // 16 steps per floor, with each displayed floor treated as 3.25m vertical ascent.
    const floorHeightMeters = 3.25;
    const stepsPerFloor = 16;
    const stepHeightMeters = floorHeightMeters / stepsPerFloor;
    const climbMillLevels = {
      1: 24, 2: 30, 3: 36, 4: 42, 5: 48,
      6: 54, 7: 60, 8: 66, 9: 72, 10: 78,
      11: 84, 12: 90, 13: 96, 14: 102, 15: 108,
      16: 114, 17: 120, 18: 126, 19: 132, 20: 138,
      21: 143, 22: 148, 23: 153, 24: 158, 25: 162
    };

    window.onload = () => {
      document.getElementById('heightInput').value = localStorage.getItem('heightInput') || '';
      document.getElementById('floorInput').value = localStorage.getItem('floorInput') || '';
      document.getElementById('targetHeightInput').value = localStorage.getItem('targetHeightInput') || '';
      document.getElementById('presetClimbInput').value = localStorage.getItem('presetClimbInput') || '';
      document.getElementById('targetMinutesInput').value = localStorage.getItem('targetMinutesInput') || '';
      document.getElementById('targetSecondsInput').value = localStorage.getItem('targetSecondsInput') || '';
      document.getElementById('hours').value = localStorage.getItem('hours') || '';
      document.getElementById('minutes').value = localStorage.getItem('minutes') || '';
      document.getElementById('seconds').value = localStorage.getItem('seconds') || '';
      document.getElementById('trailDistance').value = localStorage.getItem('trailDistance') || '';
      document.getElementById('ascent').value = localStorage.getItem('ascent') || '';
      document.getElementById('conversionFactor').value = localStorage.getItem('conversionFactor') || '0.01';
    };

    function switchTab(tab) {
      document.querySelectorAll('.calculator').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      document.querySelector(`.tab-button[onclick*="${tab}"]`).classList.add('active');
    }

    function calculateSteps() {
      const heightInput = parseFloat(document.getElementById("heightInput").value);
      if (isNaN(heightInput) || heightInput <= 0) {
        document.getElementById("resultSteps").textContent = "Please enter a valid height in metres.";
        return;
      }

      const totalFloors = Math.round(heightInput / floorHeightMeters);
      const totalSteps = totalFloors * stepsPerFloor;

      localStorage.setItem('heightInput', heightInput);
      document.getElementById("resultSteps").textContent = `${totalSteps} steps ≈ ${totalFloors} floors on the ClimbMill.`;
    }

    function calculateHeight() {
      const floorInput = parseInt(document.getElementById("floorInput").value);
      if (isNaN(floorInput) || floorInput <= 0) {
        document.getElementById("resultSteps").textContent = "Please enter a valid number of floors.";
        return;
      }

      const totalSteps = floorInput * stepsPerFloor;
      const totalHeight = (floorInput * floorHeightMeters).toFixed(2);

      localStorage.setItem('floorInput', floorInput);
      document.getElementById("resultSteps").textContent = `${floorInput} floors ≈ ${totalHeight} metres climbed.`;
    }

    function calculateLevelForTarget() {
      const targetHeight = parseFloat(document.getElementById("targetHeightInput").value);
      const targetMinutes = Math.max(0, parseInt(document.getElementById("targetMinutesInput").value) || 0);
      const targetSeconds = Math.min(59, Math.max(0, parseInt(document.getElementById("targetSecondsInput").value) || 0));
      const targetTime = targetMinutes + (targetSeconds / 60);

      if (isNaN(targetHeight) || targetHeight <= 0 || targetTime <= 0) {
        document.getElementById("resultSteps").textContent = "Please enter a valid target ascent and target time.";
        return;
      }

      const targetFloors = targetHeight / floorHeightMeters;
      const targetSteps = targetFloors * stepsPerFloor;
      const requiredSpm = targetSteps / targetTime;

      let requiredLevel = null;
      let requiredLevelSpm = null;

      for (const [level, spm] of Object.entries(climbMillLevels)) {
        if (spm >= requiredSpm) {
          requiredLevel = parseInt(level);
          requiredLevelSpm = spm;
          break;
        }
      }

      localStorage.setItem('targetHeightInput', targetHeight);
      localStorage.setItem('targetMinutesInput', targetMinutes);
      localStorage.setItem('targetSecondsInput', targetSeconds);

      const targetTimeFormatted = formatDuration(targetTime);

      if (requiredLevel === null) {
        const maxSpm = climbMillLevels[25];
        const maxSteps = maxSpm * targetTime;
        const maxFloors = maxSteps / stepsPerFloor;
        const maxHeight = maxFloors * floorHeightMeters;

        document.getElementById("resultSteps").textContent =
          `This target is above Level 25.
Required: ${requiredSpm.toFixed(1)} steps/min.
Level 25 gives ${maxSpm} steps/min, which would reach about ${maxHeight.toFixed(1)}m in ${targetTimeFormatted}.`;
        return;
      }

      const levelStepsInTargetTime = requiredLevelSpm * targetTime;
      const levelFloorsInTargetTime = levelStepsInTargetTime / stepsPerFloor;
      const levelHeightInTargetTime = levelFloorsInTargetTime * floorHeightMeters;
      const estimatedTimeAtLevel = targetSteps / requiredLevelSpm;

      document.getElementById("resultSteps").textContent =
        `Target: ${targetHeight.toFixed(1)}m / ${targetFloors.toFixed(1)} floors in ${targetTimeFormatted}
` +
        `Required pace: ${requiredSpm.toFixed(1)} steps/min
` +
        `Minimum ClimbMill level: ${requiredLevel} (${requiredLevelSpm} steps/min)
` +
        `At Level ${requiredLevel}, you would reach about ${levelHeightInTargetTime.toFixed(1)}m / ${levelFloorsInTargetTime.toFixed(1)} floors in ${targetTimeFormatted}.
` +
        `Estimated time for target at Level ${requiredLevel}: ${formatDuration(estimatedTimeAtLevel)}.`;
    }

    function resetClimbMill() {
      document.getElementById("heightInput").value = '';
      document.getElementById("floorInput").value = '';
      document.getElementById("targetHeightInput").value = '';
      document.getElementById("presetClimbInput").value = '';
      document.getElementById("targetMinutesInput").value = '';
      document.getElementById("targetSecondsInput").value = '';
      document.getElementById("resultSteps").textContent = '';
      localStorage.removeItem('heightInput');
      localStorage.removeItem('floorInput');
      localStorage.removeItem('targetHeightInput');
      localStorage.removeItem('presetClimbInput');
      localStorage.removeItem('targetMinutesInput');
      localStorage.removeItem('targetSecondsInput');
    }

    function selectPresetClimb() {
      const presetSelect = document.getElementById("presetClimbInput");
      const presetHeight = parseFloat(presetSelect.value);

      if (isNaN(presetHeight) || presetHeight <= 0) {
        return;
      }

      const floors = Math.ceil(presetHeight / floorHeightMeters);

      document.getElementById("heightInput").value = presetHeight;
      document.getElementById("floorInput").value = floors;
      document.getElementById("targetHeightInput").value = presetHeight;

      localStorage.setItem('presetClimbInput', presetSelect.value);
      localStorage.setItem('heightInput', presetHeight);
      localStorage.setItem('floorInput', floors);
      localStorage.setItem('targetHeightInput', presetHeight);

      document.getElementById("resultSteps").textContent =
        `${presetSelect.options[presetSelect.selectedIndex].text} ≈ ${floors} floors on the ClimbMill.`;
    }

    function formatDuration(timeInMinutes) {
      let minutes = Math.floor(timeInMinutes);
      let seconds = Math.round((timeInMinutes - minutes) * 60);

      if (seconds === 60) {
        minutes += 1;
        seconds = 0;
      }

      return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function formatPace(timeInMinutes) {
      const minutes = Math.floor(timeInMinutes);
      const seconds = Math.round((timeInMinutes - minutes) * 60);
      return `${minutes}:${seconds.toString().padStart(2, '0')} min`;
    }

    function calculateRecoveryPace() {
      const h = Math.max(0, parseInt(document.getElementById("hours").value) || 0);
      const m = Math.min(59, Math.max(0, parseInt(document.getElementById("minutes").value) || 0));
      const s = Math.min(59, Math.max(0, parseInt(document.getElementById("seconds").value) || 0));

      const totalSeconds = h * 3600 + m * 60 + s;
      if (totalSeconds <= 0) {
        document.getElementById("resultPace").textContent = "Please enter a valid 5K time.";
        return;
      }

      const totalMinutes = totalSeconds / 60;
      const pacePerKm = totalMinutes / 5;
      const pacePerMile = totalMinutes / 3.10686;

      const rangeMinKm = pacePerKm * 1.3;
      const rangeMaxKm = pacePerKm * 1.45;
      const rangeMinMile = pacePerMile * 1.3;
      const rangeMaxMile = pacePerMile * 1.45;

      const formattedKmMin = formatPace(rangeMinKm);
      const formattedKmMax = formatPace(rangeMaxKm);
      const formattedMileMin = formatPace(rangeMinMile);
      const formattedMileMax = formatPace(rangeMaxMile);

      localStorage.setItem('hours', h);
      localStorage.setItem('minutes', m);
      localStorage.setItem('seconds', s);

      document.getElementById("resultPace").textContent =
        `Recommended recovery pace:\n${formattedKmMin} – ${formattedKmMax} per km\n${formattedMileMin} – ${formattedMileMax} per mile`;
    }

    function resetRecovery() {
      document.getElementById("hours").value = '';
      document.getElementById("minutes").value = '';
      document.getElementById("seconds").value = '';
      document.getElementById("resultPace").textContent = '';
      localStorage.removeItem('hours');
      localStorage.removeItem('minutes');
      localStorage.removeItem('seconds');
    }

    function calculateTrailEffort() {
      const distance = parseFloat(document.getElementById("trailDistance").value);
      const ascent = parseFloat(document.getElementById("ascent").value);
      const factor = parseFloat(document.getElementById("conversionFactor").value);

      if (isNaN(distance) || isNaN(ascent) || isNaN(factor)) {
        document.getElementById("resultTrail").textContent = "Please enter valid values.";
        return;
      }

      const flatEquivalent = distance + (ascent * factor);
      localStorage.setItem('trailDistance', distance);
      localStorage.setItem('ascent', ascent);
      localStorage.setItem('conversionFactor', factor);

      document.getElementById("resultTrail").textContent =
        `${flatEquivalent.toFixed(2)} km flat-equivalent distance.`;
    }

    function resetTrail() {
      document.getElementById("trailDistance").value = '';
      document.getElementById("ascent").value = '';
      document.getElementById("conversionFactor").value = '0.01';
      document.getElementById("resultTrail").textContent = '';
      localStorage.removeItem('trailDistance');
      localStorage.removeItem('ascent');
      localStorage.removeItem('conversionFactor');
    }
  </script>
</body>
</html>
